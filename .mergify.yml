queue_rules:
  - name: default
    # What must be true to enter the queue
    queue_conditions:
      - check-success=build
      - -conflict
    # What must be true to merge once at queue head
    merge_conditions:
      - check-success=build
    merge_method: squash

pull_request_rules:
  # 1) Auto-promote everything merged on main → QA
  - name: backport merged PRs on main to release/qa
    conditions:
      - base = main
      - merged
    actions:
      backport:
        branches:
          - release/qa
        labels:
          - from:main

  - name: auto-merge backport into release/qa
    conditions:
      - base = release/qa
      - author = mergify[bot]
      - -draft
      - -conflict
    actions:
      queue:
        name: default

  # 2) Manual promote from the *main PR* directly to testnet
  - name: backport merged main to testnet when labeled
    conditions:
      - base = main
      - merged
      - label = promote:testnet
    actions:
      backport:
        branches: [release/testnet]
        labels:
          - from:main

  - name: auto-merge created backport into release/testnet
    conditions:
      - base = release/testnet
      - author = mergify[bot]
      - -draft
      - -conflict
    actions:
      queue:
        name: default

  # 3) Manual promote from the *main PR* directly to mainnet
  - name: backport merged main to mainnet when labeled
    conditions:
      - base = main
      - merged
      - label = promote:mainnet
    actions:
      backport:
        branches: [release/mainnet]
        labels:
          - from:main

  - name: auto-merge created backport into release/mainnet
    conditions:
      - base = release/mainnet
      - author = mergify[bot]
      - -draft
      - -conflict
    actions:
      queue:
        name: default
